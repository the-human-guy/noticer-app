<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <title>Noticer</title>

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles-jodit.css" />
</head>


<body
  x-data="{ sidebarOpen: false }"
  x-init="
    if ($store.Files.rootDirPath) sidebarOpen = true;
    $watch('$store.Files.rootDirPath', val => { if (val) sidebarOpen = true })
  "
>

  <!-- Alpine Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>

  <!-- Alpine Core -->
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Jodit -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jodit@latest/es2021/jodit.fat.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/jodit@latest/es2021/jodit.fat.min.js"></script>

  <!-- App -->
  <script src="./main.js"></script>
  <script src="./js/log.js"></script>
  <script src="./js/plugin-android-fs.js"></script>
  <script src="./js/prompt.js"></script>
  <script src="./js/files.js"></script>
  <script src="./js/file.js"></script>
  <script src="./js/editor-jodit.js"></script>



  <!-- Header -->
  <header class="header">
    <div class="header__left">
      <button class="btn btn--icon" @click="sidebarOpen = !sidebarOpen" title="Toggle files">
        <i class="bi bi-list"></i>
      </button>
      <button class="btn btn--icon" @click="$store.Files.pickDir()" title="Open folder">
        <i class="bi bi-folder2-open"></i>
      </button>
      <button class="btn btn--icon" :disabled="!$store.Files.rootDirPath"
        @click="$store.Files.newFile()" title="New file">
        <i class="bi bi-file-earmark-plus"></i>
      </button>
      <button class="btn btn--icon" :disabled="!$store.Files.rootDirPath"
        @click="$store.Files.newDir()" title="New folder">
        <i class="bi bi-folder-plus"></i>
      </button>
      <button class="btn btn--icon" :disabled="!$store.Files.rootDirPath"
        @click="$store.Files.openCurrentDirExternally()" title="Open in file manager">
        <i class="bi bi-box-arrow-up-right"></i>
      </button>
    </div>
    <div class="header__right">
      <button class="btn btn--icon" :disabled="!$store.File.openedFilePath"
        @click="$store.File.save()" title="Save">
        <i class="bi" :class="$store.File.saveSuccess ? 'bi-check-circle-fill text--success' : 'bi-floppy'"></i>
      </button>
      <button class="btn btn--icon" x-show="$store.settings.showLogs"
        @click="$dispatch('open-logs')" title="Logs">
        <i class="bi bi-terminal"></i>
        <span x-show="$store.logs.entries.length"
          x-text="$store.logs.entries.length"
          class="log-badge"></span>
      </button>
      <button class="btn btn--icon" @click="$dispatch('open-settings')" title="Settings">
        <i class="bi bi-gear"></i>
      </button>
    </div>
  </header>

  <!-- Sidebar Backdrop -->
  <div class="sidebar-backdrop" :class="{ 'is-visible': sidebarOpen }" @click="sidebarOpen = false"></div>

  <!-- Sidebar -->
  <aside class="sidebar" :class="{ 'is-open': sidebarOpen }">
    <div class="sidebar__header">
      <span class="sidebar__path" x-show="!isAndroid()" x-text="$store.Files.currentPath"></span>
      <div class="sidebar__search">
        <i class="bi bi-search"></i>
        <input type="text" class="sidebar__search-input" placeholder="Search..."
          x-model="$store.Files.filterText">
      </div>
    </div>
    <ul class="file-list" x-data="{ openMenuId: null }">
      <!-- Back row — only shown when not at root -->
      <li class="file-item file-item--back"
        x-show="$store.Files.canGoBack"
        @click="$store.Files.goBack()">
        <span class="file-item__icon"><i class="bi bi-arrow-up-short"></i></span>
        <span class="file-item__name">..</span>
      </li>
      <template x-for="file in $store.Files.items" :key="file.name">
        <li class="file-item" @click="$store.Files.pickFile(file)">
          <span class="file-item__icon">
            <i class="bi" :class="(file.isDirectory || file.type === 'Dir') ? 'bi-folder-fill' : 'bi-file-earmark-text'"></i>
          </span>
          <span class="file-item__name" x-text="file.name"></span>
          <button class="btn btn--icon btn--sm file-item__menu-btn"
            @click.stop="openMenuId = openMenuId === file.name ? null : file.name">
            <i class="bi bi-three-dots-vertical"></i>
          </button>
          <div class="context-menu" x-show="openMenuId === file.name"
            @click.outside="openMenuId = null" x-transition.opacity>
            <button class="context-menu__item"
              @click.stop="$store.Files.renameFileOrDir(file); openMenuId = null">
              <i class="bi bi-pencil"></i> Rename
            </button>
            <button class="context-menu__item"
              x-show="!(file.isDirectory || file.type === 'Dir')"
              @click.stop="$store.Files.duplicateFile(file); openMenuId = null">
              <i class="bi bi-copy"></i> Duplicate
            </button>
            <button class="context-menu__item"
              @click.stop="$store.Files.openInFileManager(file); openMenuId = null">
              <i class="bi bi-box-arrow-up-right"></i>
              <span x-text="isAndroid() ? 'Open with\u2026' : 'Show in File Manager'"></span>
            </button>
            <div class="context-menu__separator"></div>
            <button class="context-menu__item context-menu__item--danger"
              @click.stop="$store.Files.deleteFileOrDir(file); openMenuId = null">
              <i class="bi bi-trash"></i> Delete
            </button>
          </div>
        </li>
      </template>
    </ul>
  </aside>

  <!-- Editor -->
  <template x-if="$store.File.fileContent">
    <div>
      <textarea id="jodit-editor" x-model:value="$store.File.fileContent"></textarea>
    </div>
  </template>

  <!-- Prompt Dialog -->
  <template x-if="$store.prompt?.showPrompt">
    <div class="dialog-overlay" @click.self="$store.prompt.promptReject()">
      <div class="dialog">
        <div class="dialog__title" x-text="$store.prompt.promptMessage"></div>
        <input class="dialog__input" x-model="$store.prompt.promptValue"
          @keyup.enter="$store.prompt.promptResolve($store.prompt.promptValue)"
          type="text" x-init="$nextTick(() => { $el.focus(); $el.select() })" />
        <div class="dialog__actions">
          <button class="btn" @click="$store.prompt.promptReject()">Cancel</button>
          <button class="btn btn--primary" @click="$store.prompt.promptResolve($store.prompt.promptValue)">OK</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Confirm Dialog -->
  <template x-if="$store.confirm?.isOpen">
    <div class="dialog-overlay" @click.self="$store.confirm.cancel()">
      <div class="dialog">
        <div class="dialog__title" x-text="$store.confirm.message"></div>
        <div class="dialog__actions">
          <button class="btn" @click="$store.confirm.cancel()">Cancel</button>
          <button class="btn btn--primary" @click="$store.confirm.accept()">OK</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Settings Modal -->
  <div x-data="{ open: false, draft: {} }"
    @open-settings.window="
      draft = { ...$store.settings };
      open = true
    "
    x-show="open" style="display:none">
    <div class="dialog-overlay" @click.self="open = false">
      <div class="dialog">
        <div class="dialog__title">Settings</div>

        <div class="settings-section">
          <div class="settings-section__heading">Logs</div>
          <label class="settings-check">
            <input type="checkbox" x-model="draft.showLogs">
            <span>Capture and show app logs</span>
          </label>
        </div>

        <div class="settings-section">
          <div class="settings-section__heading">Viewport variables</div>
          <label class="settings-check">
            <input type="checkbox" x-model="draft.updateViewportOffset">
            <span>Update <code>--viewport-offset</code> (soft keyboard fix)</span>
          </label>
          <div class="settings-subsection">Trigger on:</div>
          <label class="settings-check">
            <input type="checkbox" x-model="draft.vpTriggerVvResize">
            <span><code>visualViewport</code> resize</span>
          </label>
          <label class="settings-check">
            <input type="checkbox" x-model="draft.vpTriggerVvScroll">
            <span><code>visualViewport</code> scroll</span>
          </label>
          <label class="settings-check">
            <input type="checkbox" x-model="draft.vpTriggerWinResize">
            <span><code>window</code> resize</span>
          </label>
          <label class="settings-check">
            <input type="checkbox" x-model="draft.vpTriggerDocFocusin">
            <span><code>document</code> focusin</span>
          </label>
        </div>

        <div class="settings-section">
          <div class="settings-section__heading">Scroll caret into view</div>
          <label class="settings-check">
            <input type="checkbox" x-model="draft.scrollIntoView">
            <span>Enabled</span>
          </label>
          <div class="settings-subsection">Trigger on:</div>
          <label class="settings-check">
            <input type="checkbox" x-model="draft.sivTriggerVvResize">
            <span><code>visualViewport</code> resize</span>
          </label>
          <label class="settings-check">
            <input type="checkbox" x-model="draft.sivTriggerVvScroll">
            <span><code>visualViewport</code> scroll</span>
          </label>
          <label class="settings-check">
            <input type="checkbox" x-model="draft.sivTriggerWinResize">
            <span><code>window</code> resize</span>
          </label>
          <label class="settings-check">
            <input type="checkbox" x-model="draft.sivTriggerDocFocusin">
            <span><code>document</code> focusin</span>
          </label>
        </div>

        <div class="dialog__actions">
          <button class="btn" @click="open = false">Cancel</button>
          <button class="btn btn--primary" @click="
            Object.assign($store.settings, draft);
            window.reregisterViewportListeners();
            open = false
          ">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Logs Modal -->
  <div x-data="{ open: false }"
    @open-logs.window="open = true; $nextTick(() => $refs.logsBody.scrollTop = $refs.logsBody.scrollHeight)"
    x-show="open" style="display:none">
    <div class="dialog-overlay" @click.self="open = false">
      <div class="dialog dialog--logs">
        <div class="logs-header">
          <span class="dialog__title">Logs</span>
          <div class="logs-header__actions">
            <button class="btn btn--sm" @click="$store.logs.clear()" title="Clear">
              <i class="bi bi-trash"></i> Clear
            </button>
            <button class="btn btn--icon" @click="open = false" title="Close">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        </div>
        <div class="logs-body" x-ref="logsBody"
          x-effect="$store.logs.entries.length && $nextTick(() => $refs.logsBody.scrollTop = $refs.logsBody.scrollHeight)">
          <template x-if="!$store.logs.entries.length">
            <p class="logs-empty">No logs yet.</p>
          </template>
          <template x-for="entry in $store.logs.entries" :key="entry.id">
            <div class="log-entry" :class="'log-entry--' + entry.level">
              <span class="log-entry__time" x-text="entry.time"></span>
              <span class="log-entry__level" x-text="entry.level"></span>
              <pre class="log-entry__text" x-text="entry.text"></pre>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
